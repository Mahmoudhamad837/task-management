<header class="site-header">
    <div class="header-container">
        <a class="brand" routerLink="/" aria-label="Go to home page" (click)="closeMenu()">
            <span class="brand-mark">C</span>
            <span class="brand-name">Course Management</span>
        </a>

        <button class="menu-button" type="button" aria-label="Toggle navigation menu" aria-controls="main-navigation"
            [attr.aria-expanded]="isMenuOpen()" (click)="toggleMenu()">
            @if (isMenuOpen()) {
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M18 6 6 18M6 6l12 12" />
            </svg>
            } @else {
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M4 6h16M4 12h16M4 18h16" />
            </svg>
            }
        </button>

        <nav id="main-navigation" class="navigation" [class.navigation-open]="isMenuOpen()"
            aria-label="Main navigation">
            <ul class="navigation-list">
                <li>
                    <a routerLink="/products" routerLinkActive="active-link" (click)="closeMenu()">
                        Courses
                    </a>
                </li>
            </ul>

            <div class="header-actions">
                <!-- <a class="icon-link" routerLink="/cart" aria-label="Open shopping cart" (click)="closeMenu()">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M3 4h2l2.4 10.2a2 2 0 0 0 2 1.6h7.9a2 2 0 0 0 1.9-1.4L21 8H7" />
                        <circle cx="10" cy="20" r="1" />
                        <circle cx="18" cy="20" r="1" />
                    </svg>

                    <span>Cart</span>

                    <span class="cart-count" aria-label="2 cart items">
                        2
                    </span>
                </a> -->

                @if (isAuthenticated()) {
                <button class="logout-button" type="button" (click)="logout()">
                    Logout
                </button>
                } @else {
                <a class="login-link" routerLink="/auth/login" (click)="closeMenu()">
                    Login
                </a>
                }
            </div>
        </nav>
    </div>
</header>
